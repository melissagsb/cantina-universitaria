{% extends "base_cantina.html" %}
{% block content %}
<h1 class="mb-4"><i class="fas fa-edit"></i> Editar Produto</h1>

<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Nome</label>
                        <input type="text" name="nome" class="form-control" value="{{ produto.nome }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Descrição</label>
                        <textarea name="descricao" class="form-control" rows="2">{{ produto.descricao }}</textarea>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Preço (R$)</label>
                            <input type="number" step="0.01" name="preco" class="form-control" value="{{ produto.preco }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Estoque</label>
                            <input type="number" name="estoque" class="form-control" value="{{ produto.estoque }}" required>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Categoria</label>
                            <select name="categoria" class="form-select">
                                <option value="salgado" {% if produto.categoria == 'salgado' %}selected{% endif %}>Salgado</option>
                                <option value="lanche" {% if produto.categoria == 'lanche' %}selected{% endif %}>Lanche</option>
                                <option value="bebida" {% if produto.categoria == 'bebida' %}selected{% endif %}>Bebida</option>
                                <option value="doce" {% if produto.categoria == 'doce' %}selected{% endif %}>Doce</option>
                                <option value="combo" {% if produto.categoria == 'combo' %}selected{% endif %}>Combo</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Tipo de Refeição</label>
                            <select name="tipo_refeicao" class="form-select">
                                <option value="geral" {% if produto.tipo_refeicao == 'geral' %}selected{% endif %}>Geral</option>
                                <option value="café da manhã" {% if produto.tipo_refeicao == 'café da manhã' %}selected{% endif %}>Café da Manhã</option>
                                <option value="almoço" {% if produto.tipo_refeicao == 'almoço' %}selected{% endif %}>Almoço</option>
                                <option value="lanche da tarde" {% if produto.tipo_refeicao == 'lanche da tarde' %}selected{% endif %}>Lanche da Tarde</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <div class="form-check">
                            <input type="checkbox" name="vegetariano" class="form-check-input" {% if produto.vegetariano %}checked{% endif %}>
                            <label class="form-check-label">Opção Vegetariana</label>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">URL da Imagem</label>
                        <input type="url" name="imagem_url" class="form-control" value="{{ produto.imagem_url }}">
                        <small class="text-muted">Coloque a URL de uma imagem de comida</small>
                    </div>
                    
                    <button type="submit" class="btn btn-warning">Atualizar</button>
                    <a href="/cardapio" class="btn btn-secondary">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
